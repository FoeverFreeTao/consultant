<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>正在跳转到 Vue 页面</title>
</head>
<body>
<script>
  (function () {
    var key = 'consultant_vue_redirect_once';
    var redirected = sessionStorage.getItem(key);
    if (!redirected) {
      sessionStorage.setItem(key, '1');
      var target = '/?from=legacy-static&t=' + Date.now();
      window.location.replace(target);
      return;
    }
    sessionStorage.removeItem(key);
    document.body.innerHTML = '<div style="font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; padding: 24px; color: #0f172a;">页面已切换为 Vue 版本，请访问 <a href="/">/</a></div>';
  })();
</script>
</body>
</html>

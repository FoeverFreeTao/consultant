langchain4j:
  open-ai:
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${API-KEY}
      model-name: text-embedding-v4
      log-requests: true
      log-responses: true
      max-segments-per-batch: 10
  community:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    dev.langchain4j: debug
server:
  port: 8087
spring:
  web:
    resources:
      static-locations: file:/E:/code/javasepro/consultant/diet_helper-frontend/dist/,classpath:/static/
  data:
    redis:
      host: 192.168.150.200
      port: 6379
      password: 123321
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/diet?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
mybatis-plus:
   type-aliases-package: com.zyt.consultant.entity
   configuration:
    map-underscore-to-camel-case: true
